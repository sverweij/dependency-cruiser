cache:
  key: "$CI_JOB_NAME"
  untracked: true
  paths:
    - node_modules

test_async_node:
  image: node:latest
  script:
    - npm clean-install --legacy-peer-deps --ignore-scripts
    - npm run lint
    - npm run depcruise
    - npm run test:yarn-pnp
    - npm run test:cover
  except:
    - tags
